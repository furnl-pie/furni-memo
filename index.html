<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 저장 관리</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f0f0ea;
    min-height: 100vh;
    padding: 28px 16px 60px;
    display: flex;
    justify-content: center;
  }
  .container { width: 100%; max-width: 640px; }
  h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 22px; }
  .card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e4e4dc;
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 11px; font-weight: 700; color: #aaa;
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px;
  }
  .folder-banner {
    display: flex; align-items: center; gap: 10px;
    background: #f5f5f0; border-radius: 10px; padding: 11px 14px; margin-bottom: 10px;
  }
  .folder-banner .icon { font-size: 20px; }
  .folder-info { flex: 1; min-width: 0; }
  .folder-info .name { font-size: 13px; font-weight: 600; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .folder-info .hint { font-size: 11px; color: #aaa; }
  .no-folder-text { font-size: 13px; color: #bbb; font-style: italic; }

  /* 붙여넣기 파싱 영역 */
  .paste-area {
    position: relative;
  }
  .paste-textarea {
    width: 100%;
    min-height: 130px;
    border: 1.5px dashed #c8d8f0;
    border-radius: 10px;
    padding: 13px 14px;
    font-size: 13px;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', monospace;
    line-height: 1.8;
    color: #1a1a1a;
    background: #f4f8ff;
    outline: none;
    resize: vertical;
    transition: border-color 0.15s, background 0.15s;
  }
  .paste-textarea:focus { border-color: #4a7cdc; background: #eef4ff; }
  .paste-textarea::placeholder { color: #b0c4e0; }
  .parse-btn {
    width: 100%;
    margin-top: 8px;
    background: #4a7cdc;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .parse-btn:hover { background: #3a6bc8; }
  .parse-btn:active { transform: scale(0.98); }
  .parse-status {
    font-size: 12px; margin-top: 7px; padding: 8px 12px;
    border-radius: 8px; display: none;
  }
  .parse-status.ok  { display:block; background:#eaf6f0; color:#1a7a4a; }
  .parse-status.err { display:block; background:#fdf0f0; color:#c0392b; }

  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 4px 0 14px; color: #ccc; font-size: 12px;
  }
  .divider::before, .divider::after {
    content:''; flex:1; height:1px; background:#eee;
  }

  .form-row { margin-bottom: 10px; }
  .form-row label { display: block; font-size: 11px; font-weight: 600; color: #999; margin-bottom: 4px; letter-spacing: 0.04em; }
  .form-row input, .form-row textarea {
    width: 100%; border: 1px solid #e0e0d8; border-radius: 9px;
    padding: 10px 13px; font-size: 13px; font-family: inherit; color: #1a1a1a;
    background: #fafaf8; outline: none; transition: border-color 0.15s, background 0.15s;
  }
  .form-row input:focus, .form-row textarea:focus { border-color: #4a7cdc; background: #fff; }
  .form-row input.filled { background: #f0f7ff; border-color: #c0d8f5; }
  .form-row textarea { min-height: 60px; resize: vertical; line-height: 1.6; }
  .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-row { display: flex; gap: 8px; margin-top: 4px; }
  button {
    border: none; border-radius: 10px; padding: 11px 18px;
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  button:active { transform: scale(0.97); }
  .btn-folder { background: #ededea; color: #444; white-space: nowrap; }
  .btn-folder:hover { background: #e0e0dc; }
  .btn-save { background: #4a7cdc; color: #fff; flex: 1; }
  .btn-save:hover { background: #3a6bc8; }
  .btn-save:disabled { background: #b8cef0; cursor: not-allowed; transform: none; }
  .btn-clear { background: #f5f0f0; color: #c0392b; }
  .btn-clear:hover { background: #eddede; }

  .preview-box {
    background: #f9f9f6; border: 1px solid #e8e8e0; border-radius: 10px;
    padding: 14px 16px; font-size: 13px; line-height: 2; color: #222;
    white-space: pre-wrap; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', monospace;
    margin-bottom: 10px;
  }
  .path-row {
    display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666;
    background: #f0f0ea; border-radius: 8px; padding: 9px 13px; flex-wrap: wrap;
  }
  .path-row .arrow { color: #bbb; }
  .path-seg { font-weight: 500; color: #1a1a1a; }
  .path-seg.file { color: #4a7cdc; }

  .status {
    border-radius: 10px; padding: 11px 14px; font-size: 13px; font-weight: 500;
    margin-top: 10px; display: none; white-space: pre-line; line-height: 1.6;
  }
  .status.success { background: #eaf6f0; color: #1a7a4a; border: 1px solid #b8e6cf; display: block; }
  .status.error   { background: #fdf0f0; color: #c0392b; border: 1px solid #f5c6c6; display: block; }
  .status.info    { background: #eef4fd; color: #2c5fa8; border: 1px solid #c0d6f5; display: block; }

  .badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 20px; background: #eaf6f0; color: #1a7a4a; margin-left: 6px;
  }
  .history-list { list-style: none; }
  .history-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid #f0f0ea;
  }
  .history-item:last-child { border-bottom: none; }
  .h-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .h-info { flex: 1; min-width: 0; }
  .h-name { font-size: 13px; font-weight: 600; color: #1a1a1a; }
  .h-path { font-size: 11px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .h-time { font-size: 11px; color: #bbb; flex-shrink: 0; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 일정 저장 관리</h1>
  <p class="subtitle">날짜 폴더 → 업체명 폴더 → 아파트명.txt · 같은 날짜는 같은 폴더에 누적</p>

  <!-- 루트 폴더 -->
  <div class="card">
    <div class="card-title">저장 루트 폴더</div>
    <div class="folder-banner" id="folderBanner">
      <span class="icon">📁</span>
      <span class="no-folder-text">폴더를 선택해주세요</span>
    </div>
    <button class="btn-folder" style="width:100%;" onclick="pickFolder()">📂 폴더 선택 / 변경</button>
  </div>

  <!-- 붙여넣기 파싱 -->
  <div class="card">
    <div class="card-title">📎 텍스트 붙여넣기 자동 파싱</div>
    <div class="paste-area">
      <textarea class="paste-textarea" id="pasteText"
        placeholder="업체명, 일자, 주소, 연락처 등을 그대로 붙여넣으면&#10;아래 입력칸에 자동으로 채워집니다."></textarea>
    </div>
    <button class="parse-btn" onclick="parseText()">⚡ 자동 파싱</button>
    <div class="parse-status" id="parseStatus"></div>
  </div>

  <!-- 수동 입력 폼 -->
  <div class="card">
    <div class="card-title">일정 입력</div>
    <div class="form-2col">
      <div class="form-row">
        <label>업체명 *</label>
        <input type="text" id="f_company" oninput="updatePreview()">
      </div>
      <div class="form-row">
        <label>일자 *</label>
        <input type="text" id="f_date" oninput="updatePreview()">
      </div>
    </div>
    <div class="form-row">
      <label>주소</label>
      <input type="text" id="f_address" oninput="updatePreview()">
    </div>
    <div class="form-2col">
      <div class="form-row">
        <label>공동현관 비밀번호</label>
        <input type="text" id="f_common" oninput="updatePreview()">
      </div>
      <div class="form-row">
        <label>세대 비밀번호</label>
        <input type="text" id="f_household" oninput="updatePreview()">
      </div>
    </div>
    <div class="form-2col">
      <div class="form-row">
        <label>폐기물양</label>
        <input type="text" id="f_visit" oninput="updatePreview()">
      </div>
      <div class="form-row">
        <label>연락처</label>
        <input type="text" id="f_phone" oninput="updatePreview()">
      </div>
    </div>
    <div class="form-row">
      <label>기타 메모 <span style="font-weight:400;color:#ccc;">(선택)</span></label>
      <textarea id="f_memo" oninput="updatePreview()"></textarea>
    </div>
  </div>

  <!-- 저장 버튼 (항상 표시) -->
  <div class="card">
    <div class="btn-row">
      <button class="btn-clear" onclick="clearForm()">🗑 초기화</button>
      <button class="btn-save" id="saveBtn" onclick="saveFile()" disabled>💾 저장하기</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <!-- 미리보기 -->
  <div class="card" id="previewCard" style="display:none;">
    <div class="card-title">파일 내용 미리보기</div>
    <div class="preview-box" id="previewContent"></div>
    <div class="path-row" id="pathRow"></div>
  </div>

  <!-- 저장 내역 -->
  <div class="card" id="historyCard" style="display:none;">
    <div class="card-title">저장 내역 <span class="badge" id="historyBadge">0</span></div>
    <ul class="history-list" id="historyList"></ul>
  </div>
</div>

<script>
let rootHandle = null;
let savedHistory = [];

function val(id){ return document.getElementById(id).value.trim(); }
function setVal(id, v){
  const el = document.getElementById(id);
  el.value = v;
  el.classList.toggle('filled', v.length > 0);
}

function sanitize(str){
  return str.replace(/[\\/:*?"<>|]/g,'_').replace(/\s{2,}/g,' ').trim();
}

function extractDateOnly(dateStr){
  if(!dateStr) return '날짜없음';
  const days = ['일','월','화','수','목','금','토'];
  const m = dateStr.match(/(\d+)월\s*(\d+)일\s*(\([^)]+\))?/);
  if(m){
    const mon  = parseInt(m[1]);
    const day  = parseInt(m[2]);
    let   dow  = m[3] ? m[3] : null;
    if(!dow){
      // 요일 없으면 자동 계산 (현재 연도 기준)
      const year = new Date().getFullYear();
      const d = new Date(year, mon-1, day);
      dow = '(' + days[d.getDay()] + ')';
    }
    return mon + '월' + day + '일' + dow;
  }
  return dateStr.split(/\s+/)[0];
}

function extractApartmentName(address){
  if(!address) return '주소없음';
  // 1) 아파트 단지명 패턴
  const m = address.match(/([가-힣]+(?:아파트|하임|타운|빌라|파크|뷰|힐|마을|캐슬|자이|래미안|푸르지오|이편한세상|e편한세상|아이파크|더샵|리버|센트럴|플레이스|가든|그린|시티|팰리스|스카이|트리|포레|클래스|위브|브라운스톤))/);
  if(m) return m[1];
  // 2) 아파트명 없으면 → 구 + 로/동 조합
  const gu   = address.match(/([가-힣]+구)/);
  const road = address.match(/([가-힣]+(?:로|길|대로))\s*\d*/);
  const dong = address.match(/([가-힣]+동)\s*\d*/);
  if(gu && road) return gu[1] + ' ' + road[1];
  if(gu && dong) return gu[1] + ' ' + dong[1];
  if(gu)         return gu[1];
  if(road)       return road[1];
  if(dong)       return dong[1];
  return address.split(/\s+/).slice(0,3).join(' ') || '주소없음';
}

/* ─── 자동 파싱 ─── */
function parseText(){
  const raw = document.getElementById('pasteText').value.trim();
  if(!raw){ showParseStatus('텍스트를 먼저 붙여넣어 주세요.','err'); return; }

  const lines = raw.split('\n').map(l => l.trim()).filter(l => l);
  const result = { company:'', date:'', address:'', common:'', household:'', visit:'', phone:'', memo:[] };
  const used = new Set();

  for(let i=0; i<lines.length; i++){
    const line = lines[i];

    // 키:값 형식 먼저 처리
    const colonIdx = line.indexOf(':');
    if(colonIdx > 0){
      const key = line.slice(0, colonIdx).replace(/\s/g,'');
      const v   = line.slice(colonIdx+1).trim();
      if(/업체명/.test(key))        { result.company   = v; used.add(i); continue; }
      if(/일자/.test(key))           { result.date      = v; used.add(i); continue; }
      if(/주소/.test(key))           { result.address   = v; used.add(i); continue; }
      if(/공동/.test(key))           { result.common    = v; used.add(i); continue; }
      if(/세대/.test(key))           { result.household = v; used.add(i); continue; }
    }

    // 패턴 자동 감지
    // 전화번호: 010, 011, 016, 017, 018, 019 로 시작하는 숫자 패턴
    if(/^0[1][0-9][\s\-]?\d{3,4}[\s\-]?\d{4}$/.test(line)){
      result.phone = line; used.add(i); continue;
    }
    // 폐기물양: 소량/반차/한차/분수차/1차/톤 단위 (이상·이하 포함)
    if(!result.visit && /(?:소량|반차|한차|1\/6차|1\/3차|1\/2차|2\/3차|[\d.]+차|[\d.]+톤)/.test(line)){
      result.visit = line; used.add(i); continue;
    }
    // 공동현관 비밀번호 키워드 포함
    if(/공동/.test(line)){
      result.common = line.replace(/.*공동현관\s*비밀번호?\s*:?\s*/,'').replace(/.*공동\s*:?\s*/,'').trim() || line;
      used.add(i); continue;
    }
    // 세대 비밀번호
    if(/세대/.test(line)){
      result.household = line.replace(/.*세대\s*비밀번호?\s*:?\s*/,'').trim() || line;
      used.add(i); continue;
    }
    // 날짜: 월/일 패턴 포함
    if(!result.date && /\d+월\s*\d+일/.test(line)){
      result.date = line; used.add(i); continue;
    }
    // 주소: 시/구/동/로/길 포함
    if(!result.address && /(?:시|구|동|로|길)\s/.test(line)){
      result.address = line; used.add(i); continue;
    }
  }

  // 남은 줄 중 첫 번째 = 업체명 (아직 없으면)
  if(!result.company){
    for(let i=0; i<lines.length; i++){
      if(!used.has(i)){ result.company = lines[i]; used.add(i); break; }
    }
  }

  // 나머지 미분류 줄 → 메모
  for(let i=0; i<lines.length; i++){
    if(!used.has(i)) result.memo.push(lines[i]);
  }

  // 폼에 채우기
  setVal('f_company',   result.company);
  setVal('f_date',      result.date);
  setVal('f_address',   result.address);
  setVal('f_common',    result.common);
  setVal('f_household', result.household);
  setVal('f_visit',     result.visit);
  setVal('f_phone',     result.phone);
  setVal('f_memo',      result.memo.join('\n'));

  updatePreview();

  const filled = [result.company, result.date, result.address, result.phone].filter(Boolean).length;
  showParseStatus(`✅ 파싱 완료 — 업체명·일자·주소·연락처 등 ${filled}개 항목 인식`, 'ok');
}

document.getElementById('pasteText').addEventListener('paste', ()=>{
  setTimeout(parseText, 50); // 붙여넣기 직후 자동 파싱
});

/* ─── 파싱 상태 ─── */
function showParseStatus(msg, type){
  const el = document.getElementById('parseStatus');
  el.className = 'parse-status ' + type;
  el.textContent = msg;
}

/* ─── 미리보기 ─── */
function buildContent(){
  const company   = val('f_company');
  const date      = val('f_date');
  const address   = val('f_address');
  const common    = val('f_common');
  const household = val('f_household');
  const visit     = val('f_visit');
  const phone     = val('f_phone');
  const memo      = val('f_memo');

  const lines = [];
  if(company)   lines.push(company);
  if(date)      lines.push(date);
  if(address)   lines.push(address);
  if(common)    lines.push(' 공동현관 비밀번호 : ' + common);
  if(household) lines.push('세대 비밀번호 : ' + household);
  if(visit)     lines.push(visit);
  if(phone)     lines.push(phone);
  if(memo)      lines.push(memo);
  return lines.join('\n');
}

function updatePreview(){
  const company = val('f_company');
  const date    = val('f_date');
  const address = val('f_address');
  const previewCard = document.getElementById('previewCard');
  if(!company && !date && !address){ previewCard.style.display='none'; return; }
  previewCard.style.display='block';

  document.getElementById('previewContent').textContent = buildContent();

  const aptName       = extractApartmentName(address);
  const dateOnly      = extractDateOnly(date);
  const dateFolder    = sanitize(dateOnly);
  const companyFolder = sanitize(company || '업체없음');
  const fileName      = sanitize(aptName) + '.txt';
  const rootName      = rootHandle ? rootHandle.name : '루트폴더';

  document.getElementById('pathRow').innerHTML =
    `<span class="path-seg">${rootName}</span>`+
    `<span class="arrow">›</span><span class="path-seg">${dateFolder}</span>`+
    `<span class="arrow">›</span><span class="path-seg">${companyFolder}</span>`+
    `<span class="arrow">›</span><span class="path-seg file">${fileName}</span>`;

  document.getElementById('saveBtn').disabled = !rootHandle || !company || !date;
}

/* ─── 폴더 선택 ─── */
async function pickFolder(){
  try{
    rootHandle = await window.showDirectoryPicker({ mode:'readwrite' });
    document.getElementById('folderBanner').innerHTML =
      `<span class="icon">✅</span>`+
      `<div class="folder-info">`+
        `<div class="name">${rootHandle.name}</div>`+
        `<div class="hint">이 폴더 안에 날짜별 폴더가 자동 생성됩니다</div>`+
      `</div>`;
    updatePreview();
    showStatus('폴더 선택 완료: '+rootHandle.name,'info');
  } catch(e){
    if(e.name!=='AbortError') showStatus('폴더 선택 실패: '+e.message,'error');
  }
}

async function getOrCreateDir(parent,name){
  return await parent.getDirectoryHandle(name,{create:true});
}

/* ─── 저장 ─── */
async function saveFile(){
  const company = val('f_company');
  const date    = val('f_date');
  const address = val('f_address');
  if(!rootHandle){ showStatus('저장 폴더를 먼저 선택해주세요.','error'); return; }
  if(!company||!date){ showStatus('업체명과 일자는 필수입니다.','error'); return; }

  const aptName      = extractApartmentName(address);
  const dateOnly     = extractDateOnly(date);
  const dateFolder   = sanitize(dateOnly);
  const companyBase  = sanitize(company);
  const aptSanitized = sanitize(aptName);
  const fileName     = aptSanitized + '.txt';
  const content      = buildContent();

  const saveBtn = document.getElementById('saveBtn');
  try{
    saveBtn.disabled=true; saveBtn.textContent='저장 중...';
    const dateDir = await getOrCreateDir(rootHandle, dateFolder);

    const companyFolder = companyBase + '_' + aptSanitized;

    const companyDir = await getOrCreateDir(dateDir, companyFolder);
    const fileHandle = await companyDir.getFileHandle(fileName,{create:true});
    const writable   = await fileHandle.createWritable();
    await writable.write(new TextEncoder().encode(content));
    await writable.close();

    const pathStr=`${rootHandle.name} / ${dateFolder} / ${companyFolder} / ${fileName}`;
    showStatus(`✅ 저장 완료!\n📄 ${pathStr}`,'success');
    addHistory({company, date, aptName, pathStr});
    clearForm(false);
    document.getElementById('pasteText').value='';
    document.getElementById('parseStatus').className='parse-status';
  } catch(e){
    showStatus('저장 실패: '+e.message,'error');
  } finally{
    saveBtn.disabled=false; saveBtn.textContent='💾 저장하기';
  }
}

/* ─── 내역 ─── */
function addHistory(item){
  const now=new Date();
  const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  savedHistory.unshift({...item,t});
  document.getElementById('historyCard').style.display='block';
  document.getElementById('historyBadge').textContent=savedHistory.length;
  document.getElementById('historyList').innerHTML=savedHistory.map(h=>
    `<li class="history-item">`+
      `<span class="h-icon">📄</span>`+
      `<div class="h-info">`+
        `<div class="h-name">${h.company} · ${h.aptName}</div>`+
        `<div class="h-path">${h.pathStr}</div>`+
      `</div>`+
      `<span class="h-time">${h.t}</span>`+
    `</li>`
  ).join('');
}

/* ─── 초기화 ─── */
function clearForm(resetStatus=true){
  ['f_company','f_date','f_address','f_common','f_household','f_visit','f_phone','f_memo']
    .forEach(id=>{ document.getElementById(id).value=''; document.getElementById(id).classList.remove('filled'); });
  document.getElementById('previewCard').style.display='none';
  if(resetStatus){ document.getElementById('status').className='status'; }
  document.getElementById('saveBtn').disabled=true;
}

function showStatus(msg,type){
  const el=document.getElementById('status');
  el.className='status '+type; el.textContent=msg;
}
</script>
</body>
</html>
